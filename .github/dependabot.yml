version: 2
updates:
  # Maintain dependencies for GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"

  - package-ecosystem: "gitsubmodule"
    directory: "/"
    schedule:
      interval: "weekly"

  - package-ecosystem: "npm"
    directories:
      - "/"
      - "/prototypes/extdata-formats/browser"
      - "/prototypes/jsroot-svelte5"
      - "/prototypes/svelte5-state"
      - "/prototypes/wasm-preload/app"
    schedule:
      interval: "daily"
    groups:
      svelte-vite-tooling:
        patterns:
          - "@lucide/svelte"
          - "@sveltejs/*"
          - "@vitejs/*"
          - "@vitest/*"
          - "svelte"
          - "svelte-check"
          - "vite"
          - "vitest"
      javascript-tooling:
        dependency-type: "development"
        patterns:
          - "*"
      javascript-runtime:
        dependency-type: "production"
        patterns:
          - "*"
    # Add reviewers
    reviewers:
      - "grzanka"
