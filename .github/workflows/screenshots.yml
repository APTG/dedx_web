name: Documentation Screenshots

# Regenerates static/screenshots/ after every push to master. When the images
# change, the job opens a fresh pull request from a NEW, uniquely-named branch
# (screenshots/auto-update-<run-id>) and enables squash auto-merge so it lands
# once status checks pass.
#
# Why a unique branch per run (instead of a single reused branch): reusing one
# fixed branch made `gh pr view <branch>` match the *previous, already-merged*
# PR, so the "does a PR already exist?" check was always true and no new PR was
# ever opened — the regenerated images just piled up on the branch, unmerged. A
# fresh branch each time always gets its own PR.
#
# Before opening the new PR the job retires every prior screenshot branch and
# closes its PR: a newer render supersedes them, and this also sweeps up any
# branch left behind by a run the concurrency guard cancelled mid-flight.
#
# Prerequisites:
#   - "Allow auto-merge" must be enabled in repo Settings → General.
#   - Branch protection is fully respected — no direct push to master.
#
# Anti-loop guard: the squash-merge commit that lands on master starts with
# "docs: update screenshots", which the `if:` below excludes, so the merge does
# not trigger another screenshot run and the loop terminates after one PR.

on:
  push:
    branches: [master]

concurrency:
  group: screenshots-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  screenshots:
    name: Generate & commit documentation screenshots
    runs-on: ubuntu-latest
    if: "!startsWith(github.event.head_commit.message, 'docs: update screenshots')"

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Set up pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Set up Docker
        uses: docker/setup-buildx-action@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build WASM module
        run: |
          mkdir -p static/wasm
          cd wasm && chmod +x build.sh && ./build.sh

      - name: Build SvelteKit app
        run: pnpm build

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Generate documentation screenshots
        run: pnpm docs:screenshots

      - name: Check for screenshot changes
        id: diff
        run: |
          if git diff --quiet static/screenshots/; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      # Best-effort: a newer render supersedes any earlier one. Close every open
      # screenshot PR and delete every prior screenshot branch — including
      # orphans from cancelled runs and the pre-unique-branch leftover. The
      # branch opened in the next step carries this run's id, so it does not yet
      # exist here and is never swept.
      - name: Retire prior screenshot branches
        if: steps.diff.outputs.changed == 'true'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api "repos/${{ github.repository }}/branches" --paginate \
            --jq '.[].name | select(startswith("screenshots/auto-update"))' \
          | while read -r br; do
              [ -n "$br" ] || continue
              pr="$(gh pr list --state open --head "$br" --json number --jq '.[0].number // empty')"
              if [ -n "$pr" ]; then
                echo "Closing superseded screenshot PR #$pr ($br)"
                gh pr close "$pr" \
                  --comment "Superseded by a newer screenshot render (run ${{ github.run_id }})." || true
              fi
              echo "Deleting prior screenshot branch $br"
              gh api -X DELETE "repos/${{ github.repository }}/git/refs/heads/$br" || true
            done

      - name: Open auto-merge PR from a fresh branch
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          BRANCH="screenshots/auto-update-${{ github.run_id }}-${{ github.run_attempt }}"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git switch -c "$BRANCH"
          git add static/screenshots/
          git commit -m "docs: update screenshots [skip ci]"
          git push origin "$BRANCH"

          gh pr create \
            --title "docs: update screenshots" \
            --body "Auto-generated by the screenshots workflow from ${GITHUB_SHA:0:7}." \
            --base master \
            --head "$BRANCH"

          gh pr merge "$BRANCH" --auto --squash --delete-branch
