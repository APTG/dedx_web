name: Documentation Screenshots

# Regenerates static/screenshots/ after every push to master. When images
# change, the job pushes to screenshots/auto-update and opens (or updates)
# a pull request that auto-merges via squash once status checks pass.
#
# Prerequisites:
#   - "Allow auto-merge" must be enabled in repo Settings → General.
#   - Branch protection is fully respected — no direct push to master.
#
# Anti-loop guard: when the squash-merge commit lands on master its message
# starts with "docs: update screenshots", which matches the `if:` condition
# below, so the job is skipped and the loop terminates after one PR.

on:
  push:
    branches: [master]

concurrency:
  group: screenshots-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  screenshots:
    name: Generate & commit documentation screenshots
    runs-on: ubuntu-latest
    if: "!startsWith(github.event.head_commit.message, 'docs: update screenshots')"

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Set up pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Set up Docker
        uses: docker/setup-buildx-action@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build WASM module
        run: |
          mkdir -p static/wasm
          cd wasm && chmod +x build.sh && ./build.sh

      - name: Build SvelteKit app
        run: pnpm build

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Generate documentation screenshots
        run: pnpm docs:screenshots

      - name: Check for screenshot changes
        id: diff
        run: |
          if git diff --quiet static/screenshots/; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Open or update auto-merge PR
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="screenshots/auto-update"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add static/screenshots/
          git commit -m "docs: update screenshots [skip ci]"
          git push origin "$BRANCH" --force

          # Create PR if none is open for this branch; a force-push already
          # updates an existing one, so this step is safe to run every time.
          gh pr create \
            --title "docs: update screenshots" \
            --body "Auto-generated by the screenshots workflow." \
            --base master \
            --head "$BRANCH" 2>/dev/null || true

          gh pr merge "$BRANCH" --auto --squash --delete-branch
