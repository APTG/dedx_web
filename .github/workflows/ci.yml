name: CI

on:
  push:
    branches: [master, "feature/**", "fix/**", "qwen/**"]
  pull_request:
    branches: [master]

jobs:
  wasm-verify:
    name: WASM Build + Contract Verification
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Set up Docker
        uses: docker/setup-buildx-action@v3

      - name: Build WASM module (web,node → static/wasm/)
        run: |
          mkdir -p static/wasm
          cd wasm
          chmod +x build.sh
          ./build.sh

      - name: Verify WASM contract (67 checks)
        run: node wasm/verify.mjs

      - name: Upload WASM binaries
        uses: actions/upload-artifact@v4
        with:
          name: wasm-binaries
          path: static/wasm/libdedx.*
          retention-days: 1

      - name: Upload verification stats
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: wasm-verification-stats
          path: |
            data/wasm_runtime_stats.json
            data/wasm_ts_contract_stats.json
          retention-days: 7

  unit-tests:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run unit & integration tests
        run: pnpm exec vitest run --coverage --reporter=verbose

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: coverage/
          retention-days: 7

  e2e-tests:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    needs: [wasm-verify]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download WASM binaries
        uses: actions/download-artifact@v8
        with:
          name: wasm-binaries
          path: static/wasm/

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Build app
        run: pnpm build

      - name: Run E2E tests
        run: pnpm test:e2e

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-results
          path: test-results/
          retention-days: 7
