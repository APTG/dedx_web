name: CI

on:
  push:
    branches: [master, "feature/**", "feat/**", "fix/**", "qwen/**"]
  pull_request:
    branches: [master]
  workflow_dispatch:

# Cancel in-progress runs when a new commit is pushed to the same branch,
# preventing stale runs from queuing and blocking CI feedback.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  actions: read

jobs:
  workflow-guards:
    name: Workflow Guards
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Guard forbidden generated files / vendor gitlinks
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            RANGE="${{ github.event.pull_request.base.sha }}..${{ github.sha }}"
          else
            # GitHub push payload uses all-zero SHA when there is no previous commit on ref
            BEFORE="${{ github.event.before }}"
            if [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
              # Initial push on a new branch: diff against the branch point, not the
              # empty tree, so inherited vendor submodules don't look like new gitlinks.
              DEFAULT_BRANCH="${{ github.event.repository.default_branch }}"
              git fetch --no-tags origin "$DEFAULT_BRANCH:refs/remotes/origin/$DEFAULT_BRANCH"
              BEFORE="$(git merge-base "${{ github.sha }}" "origin/$DEFAULT_BRANCH")"
              if [ -z "$BEFORE" ]; then
                BEFORE="4b825dc642cb6eb9a060e54bf8d69288fbee4904"
              fi
            fi
            RANGE="$BEFORE..${{ github.sha }}"
          fi
          node scripts/guard-forbidden-files.cjs --range "$RANGE"

      - name: Check WASM contract docs drift
        run: node scripts/check-wasm-contract-docs.cjs

  wasm-verify:
    name: WASM Build + Contract Verification
    runs-on: ubuntu-latest
    needs: [workflow-guards]

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Set up Docker
        uses: docker/setup-buildx-action@v4

      - name: Build WASM module (web,node → static/wasm/)
        run: |
          mkdir -p static/wasm
          cd wasm
          chmod +x build.sh
          ./build.sh

      - name: Verify WASM contract (67 checks)
        run: node wasm/verify.mjs

      - name: Upload WASM binaries
        uses: actions/upload-artifact@v7
        with:
          name: wasm-binaries
          path: static/wasm/libdedx.*
          retention-days: 1

      - name: Upload verification stats
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: wasm-verification-stats
          path: |
            data/wasm_runtime_stats.json
            data/wasm_ts_contract_stats.json
          retention-days: 7

  unit-tests:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    needs: [workflow-guards]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run unit & integration tests
        run: pnpm exec vitest run --coverage --reporter=verbose

      - name: Upload coverage
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage
          path: coverage/
          retention-days: 7

  e2e-tests:
    name: E2E Tests (Playwright ${{ matrix.shard }}/2)
    runs-on: ubuntu-latest
    needs: [workflow-guards, wasm-verify]
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download WASM binaries
        uses: actions/download-artifact@v8
        with:
          name: wasm-binaries
          path: static/wasm/

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium firefox

      - name: Build app
        run: pnpm build

      - name: Run E2E tests
        run: pnpm test:e2e --grep-invert @nightly --shard=${{ matrix.shard }}/2

      - name: Upload Playwright report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-report-${{ matrix.shard }}-of-2
          path: playwright-report/
          retention-days: 7

      - name: Upload test results
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: test-results-${{ matrix.shard }}-of-2
          path: test-results/
          retention-days: 7
