name: Deploy

# Deploys to APTG/web_dev on every push to master.
# Production deploy to APTG/web will be triggered by git tags: ['v*'] in Stage 8.

on:
  push:
    branches: [master]

permissions:
  contents: read

jobs:
  deploy-dev:
    name: Build & deploy to web_dev
    runs-on: ubuntu-latest
    environment:
      name: dev
      url: https://aptg.github.io/web_dev/

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Set up Docker
        uses: docker/setup-buildx-action@v4

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build WASM module
        run: |
          mkdir -p static/wasm
          cd wasm && chmod +x build.sh && ./build.sh

      - name: Build SvelteKit app
        run: pnpm build
        env:
          # GitHub Pages serves APTG/web_dev at /web_dev/ sub-path
          BASE_PATH: /web_dev

      - name: Deploy to APTG/web_dev
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.WEB_DEV_DEPLOY_TOKEN }}
          external_repository: APTG/web_dev
          publish_branch: gh-pages
          publish_dir: ./build
          commit_message: "deploy: ${{ github.sha }} from ${{ github.ref_name }}"
