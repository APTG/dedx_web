name: Deploy

# Phase 1 (pre-Stage 4): deploys static/index.html placeholder from `develop`.
# Phase 2 (Stage 8): switch trigger to `master` + `tags: ['v*']`,
#   replace publish_dir with ./build (output of pnpm build),
#   remove static/index.html, and add production deploy job for APTG/web.

on:
  push:
    branches: [develop]

permissions:
  contents: read

jobs:
  deploy-dev:
    name: Deploy placeholder to web_dev
    runs-on: ubuntu-latest
    environment:
      name: dev
      url: https://aptg.github.io/web_dev/

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to APTG/web_dev
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.WEB_DEV_DEPLOY_TOKEN }}
          external_repository: APTG/web_dev
          publish_branch: gh-pages
          publish_dir: ./static
          commit_message: "deploy: ${{ github.sha }} from ${{ github.ref_name }}"
