- table:
  - rowgroup:
    - 'row "Drag handle # Energy (MeV) STP (keV/µm) CSDA Range Delete row"':
      - columnheader "Drag handle"
      - columnheader "#"
      - columnheader "Energy (MeV)"
      - columnheader "STP (keV/µm)"
      - columnheader "CSDA Range"
      - columnheader "Delete row"
  - rowgroup:
    - row /1 \d+ \d+\.\d+ \d+\.\d+ mm Delete row 1/:
      - cell "1"
      - cell /\d+/:
        - textbox "Energy value row 1":
          - /placeholder: e.g. 100 keV
          - text: /\d+/
      - cell /\d+\.\d+/
      - cell /\d+\.\d+ mm/
      - cell "Delete row 1":
        - button "Delete row 1": ×
    - row /2 \d+ \d+\.\d+ \d+\.\d+ cm Delete row 2/:
